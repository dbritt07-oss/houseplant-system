<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- makes "Add to Home Screen" launch standalone, so we test OAuth in the REAL PWA context -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PDHQ Spike">
<title>PDHQ — Drive backup spike</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  body{font-family:system-ui,sans-serif;margin:0;padding:16px;background:#1c1c1e;color:#eee;line-height:1.4}
  h1{font-size:18px;margin:0 0 4px} .sub{color:#999;font-size:13px;margin:0 0 14px}
  button{display:block;width:100%;padding:14px;margin:8px 0;font-size:16px;border:none;border-radius:10px;background:#3a7;color:#fff;font-weight:600}
  button:disabled{opacity:.4}
  button.alt{background:#357}
  .status{font-size:13px;padding:8px 10px;border-radius:8px;background:#2c2c2e;margin:8px 0}
  #log{white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:12px;background:#000;color:#6f6;
    padding:10px;border-radius:8px;height:44vh;overflow:auto;margin-top:12px}
  .warn{color:#fd6}
  input{width:100%;padding:10px;border-radius:8px;border:1px solid #444;background:#111;color:#eee;font-size:13px;box-sizing:border-box}
</style>
</head>
<body>
<h1>Drive backup spike</h1>
<p class="sub">Proves Google Drive OAuth + app-data round-trip from an installed iOS PWA. Throwaway — delete after T0.4.</p>

<div class="status" id="mode">display mode: checking…</div>

<label class="sub">Client ID (public, not a secret):</label>
<input id="cid" placeholder="xxxxx.apps.googleusercontent.com" autocapitalize="off" autocorrect="off" spellcheck="false">

<button id="connect">1 · Connect Google Drive</button>
<button id="backup" class="alt" disabled>2 · Back up a test blob</button>
<button id="restore" class="alt" disabled>3 · Restore it</button>
<button id="clear" class="alt" disabled>4 · Delete the test file</button>

<div id="log">boot…\n</div>

<script>
const SCOPE = "https://www.googleapis.com/auth/drive.appdata";
const FILENAME = "pdhq-spike.json";
let token = null, tokenClient = null;

const $ = id => document.getElementById(id);
const log = (m, cls) => { const t = new Date().toLocaleTimeString(); $("log").innerHTML += `<span class="${cls||''}">[${t}] ${m}</span>\n`; $("log").scrollTop = $("log").scrollHeight; };

// Show whether we're standalone (installed PWA) or a normal tab — the whole point of the test.
(function detectMode(){
  const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  $("mode").textContent = "display mode: " + (standalone ? "STANDALONE (installed PWA ✅ real test)" : "browser tab (add to Home Screen to test the PWA case)");
})();

// Restore a saved Client ID so you don't retype it on the phone.
$("cid").value = localStorage.getItem("pdhq_cid") || "";
$("cid").addEventListener("change", () => localStorage.setItem("pdhq_cid", $("cid").value.trim()));

function ensureClient(){
  const cid = $("cid").value.trim();
  if (!cid) { log("Enter your Client ID first.", "warn"); return null; }
  if (!window.google || !google.accounts || !google.accounts.oauth2) { log("Google Identity script not loaded yet — wait a second and retry.", "warn"); return null; }
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: cid,
      scope: SCOPE,
      callback: (resp) => {
        if (resp.error) { log("TOKEN ERROR: " + resp.error + " — " + (resp.error_description||""), "warn"); return; }
        token = resp.access_token;
        log("✅ Got access token (len " + token.length + "). OAuth works in this context.");
        $("backup").disabled = $("restore").disabled = $("clear").disabled = false;
      }
    });
  }
  return tokenClient;
}

$("connect").onclick = () => {
  const c = ensureClient(); if (!c) return;
  log("Requesting access token… (a Google popup/redirect should appear)");
  try { c.requestAccessToken(); } catch (e) { log("requestAccessToken threw: " + e.message, "warn"); }
};

async function findFileId(){
  const r = await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime)&q=" + encodeURIComponent("name='"+FILENAME+"'"), { headers: { Authorization: "Bearer " + token } });
  const j = await r.json();
  if (!r.ok) throw new Error("list failed: " + JSON.stringify(j));
  return (j.files && j.files[0]) ? j.files[0].id : null;
}

$("backup").onclick = async () => {
  try {
    const payload = { hello: "plant daddy", when: new Date().toISOString(), nonce: Math.random().toString(36).slice(2) };
    const meta = { name: FILENAME, parents: ["appDataFolder"] };
    const existing = await findFileId();
    const boundary = "pdhq" + Date.now();
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` +
      JSON.stringify(existing ? {} : meta) +
      `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
      JSON.stringify(payload) +
      `\r\n--${boundary}--`;
    const url = existing
      ? `https://www.googleapis.com/upload/drive/v3/files/${existing}?uploadType=multipart`
      : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const r = await fetch(url, { method: existing ? "PATCH" : "POST", headers: { Authorization: "Bearer " + token, "Content-Type": `multipart/related; boundary=${boundary}` }, body });
    const j = await r.json();
    if (!r.ok) throw new Error(JSON.stringify(j));
    log(`✅ Backup ${existing ? "updated" : "created"} in appDataFolder. fileId=${j.id}. nonce=${payload.nonce}`);
  } catch (e) { log("BACKUP FAILED: " + e.message, "warn"); }
};

$("restore").onclick = async () => {
  try {
    const id = await findFileId();
    if (!id) { log("No backup file found yet — run step 2 first.", "warn"); return; }
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`, { headers: { Authorization: "Bearer " + token } });
    const txt = await r.text();
    if (!r.ok) throw new Error(txt);
    log("✅ Restored contents: " + txt);
  } catch (e) { log("RESTORE FAILED: " + e.message, "warn"); }
};

$("clear").onclick = async () => {
  try {
    const id = await findFileId();
    if (!id) { log("Nothing to delete."); return; }
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${id}`, { method: "DELETE", headers: { Authorization: "Bearer " + token } });
    if (r.status === 204) log("✅ Test file deleted.");
    else log("delete returned " + r.status, "warn");
  } catch (e) { log("DELETE FAILED: " + e.message, "warn"); }
};

log("ready. Enter Client ID → Connect → Back up → Restore.");
</script>
</body>
</html>
