<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#ece1c6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Plant Daddy HQ">
<title>Plant Daddy HQ</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,1,400&family=Spline+Sans:wght@400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ece1c6; --paper2:#e4d7b7; --card:#f4ecd6; --card2:#efe6cd;
    --ink:#2f2a20; --pen:#463d2d; --pencil:#a89a7e; --muted:#7c7157; --faint:#a89d82;
    --line:#cabf9d; --sage:#5f7a4c; --wash:#8fa978; --rust:#b0563a; --gold:#b3872f;
    --ok:#5f7a4c; --warn:#b3872f; --bad:#b0563a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Spline Sans",system-ui,sans-serif;line-height:1.45;
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center}
  #app{width:100%;max-width:440px;min-height:100vh;position:relative;padding-bottom:82px;overflow-x:hidden;
    background:radial-gradient(circle, rgba(120,105,70,.16) 1.1px, transparent 1.1px) 0 0/23px 23px, linear-gradient(180deg,#efe5ca,var(--paper));
    box-shadow:0 0 50px rgba(60,45,20,.28)}
  .pad{padding:16px 16px 0}
  h1,h2,h3{font-family:"Fraunces",serif;font-weight:500;letter-spacing:-.01em;margin:0}
  .hand{font-family:"Caveat",cursive}
  .eyebrow{font-family:"Caveat",cursive;font-size:16px;color:var(--muted);margin:0 0 2px}
  .muted{color:var(--muted)} .faint{color:var(--faint)} i{font-style:italic}
  /* top bar */
  .topbar{position:sticky;top:0;z-index:20;background:rgba(236,225,198,.92);backdrop-filter:blur(8px);
    border-bottom:1.5px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .topbar .t{font-family:"Caveat",cursive;font-size:23px;font-weight:700;line-height:1}
  .topbar .d{font-family:"Caveat",cursive;font-size:16px;color:var(--muted)}
  .iconbtn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;display:grid;place-items:center;color:var(--pen)}
  .iconbtn svg{width:19px;height:19px}
  /* cards, stats */
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:5px 14px 6px 12px;box-shadow:2px 3px 0 rgba(120,100,60,.13)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
  .stat{background:var(--card);border:1.5px solid var(--line);border-radius:6px 12px 5px 12px;padding:11px 8px;text-align:center;box-shadow:2px 3px 0 rgba(120,100,60,.1)}
  .stat .n{font-family:"Fraunces",serif;font-size:24px;line-height:1}
  .stat .l{font-family:"Caveat",cursive;font-size:14px;color:var(--muted);margin-top:3px}
  .prog{height:12px;background:var(--paper2);border:1.5px solid var(--line);border-radius:9px;overflow:hidden;margin:4px 0 3px}
  .progfill{height:100%;background:repeating-linear-gradient(45deg,var(--sage),var(--sage) 6px,#6b8656 6px,#6b8656 12px)}
  .section-h{display:flex;justify-content:space-between;align-items:baseline;margin:22px 0 11px}
  .section-h h2{font-size:20px} .section-h .more{font-family:"Caveat",cursive;font-size:16px;color:var(--rust);cursor:pointer}
  .banner{background:var(--card2);border:1.5px solid var(--line);border-radius:6px 14px 5px 13px;padding:13px;display:flex;gap:12px;align-items:center;box-shadow:2px 3px 0 rgba(120,100,60,.1)}
  .banner .ic{width:38px;height:38px;border-radius:50%;background:#e6ddbf;border:1.5px solid var(--line);display:grid;place-items:center;flex:0 0 auto}
  .banner .ic svg{width:22px;height:22px} .banner .bt{font-weight:500;font-size:14px} .banner .bs{font-size:12.5px;color:var(--muted)}
  .cta{display:flex;width:100%;margin-top:14px;padding:15px;border:1.5px solid var(--pen);border-radius:8px 16px 7px 15px;
    background:var(--sage);color:#f4ecd6;font-family:"Fraunces",serif;font-size:17px;align-items:center;justify-content:center;gap:9px;cursor:pointer;box-shadow:2px 3px 0 rgba(60,55,25,.3)}
  .cta:active{transform:translate(1px,1px);box-shadow:1px 2px 0 rgba(60,55,25,.3)}
  .cta .arw{font-family:"Caveat",cursive;font-size:22px}
  /* queue card */
  .qcard{display:flex;gap:12px;align-items:center;background:var(--card);border:1.5px solid var(--line);border-radius:5px 12px 6px 12px;padding:10px;margin-bottom:9px;cursor:pointer;box-shadow:2px 3px 0 rgba(120,100,60,.1);position:relative}
  .qcard:active{transform:translate(1px,1px)}
  .qthumb{width:50px;height:56px;border-radius:4px;background:#f8f1dd;border:1.5px solid var(--line);flex:0 0 auto;overflow:hidden;display:grid;place-items:center}
  .qthumb svg{width:100%;height:100%} .qthumb img{width:100%;height:100%;object-fit:cover}
  .qbody{flex:1;min-width:0}
  .qname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qlatin{font-family:"Fraunces",serif;font-style:italic;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qaction{font-size:12px;margin-top:3px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1.5px solid var(--line);color:var(--muted);white-space:nowrap;background:#f4ecd6}
  .chip.ok{color:var(--ok);border-color:#9fb083} .chip.warn{color:var(--warn);border-color:#cbb27a} .chip.bad{color:var(--bad);border-color:#cf9d8b}
  /* plants grid */
  .search{width:100%;background:#f6efdb;border:1.5px solid var(--line);border-radius:8px;color:var(--ink);font:inherit;font-size:14px;padding:11px 13px;margin-bottom:12px;outline:none}
  .search::placeholder{color:var(--faint)}
  .filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:13px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fbtn{font-family:"Caveat",cursive;font-size:16px;padding:4px 13px;border-radius:999px;border:1.5px solid var(--line);background:#f4ecd6;color:var(--muted);white-space:nowrap;cursor:pointer}
  .fbtn.on{background:var(--pen);color:var(--card);border-color:var(--pen)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pcard{background:var(--card);border:1.5px solid var(--line);border-radius:5px 13px 6px 12px;overflow:hidden;cursor:pointer;box-shadow:2px 3px 0 rgba(120,100,60,.12);position:relative}
  .pcard:active{transform:translate(1px,1px)}
  .pcard .panel{aspect-ratio:1/.9;background:#f8f1dd;display:grid;place-items:center;position:relative;border-bottom:1.5px solid var(--line)}
  .pcard .panel svg{width:86%;height:86%} .pcard .panel img{width:100%;height:100%;object-fit:cover}
  .pcard .pageno{position:absolute;bottom:5px;right:8px;font-family:"Caveat",cursive;font-size:14px;color:var(--faint)}
  .pcard .dot{position:absolute;top:8px;left:8px;width:9px;height:9px;border-radius:50%;border:1px solid rgba(0,0,0,.15)}
  .pcard .info{padding:8px 10px 10px}
  .pcard .cn{font-size:13px;font-weight:500;line-height:1.15}
  .pcard .ln{font-family:"Fraunces",serif;font-style:italic;font-size:10.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcard .loc{font-family:"Caveat",cursive;font-size:13px;color:var(--faint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* overlay + sheet */
  .overlay{position:fixed;inset:0;z-index:50;display:flex;justify-content:center;align-items:flex-end}
  .overlay .scrim{position:absolute;inset:0;background:rgba(40,30,10,.42)}
  .sheet{position:relative;width:100%;max-width:440px;max-height:94vh;overflow-y:auto;background:var(--paper);
    background-image:radial-gradient(circle, rgba(120,105,70,.14) 1.1px, transparent 1.1px);background-size:23px 23px;
    border-radius:18px 18px 0 0;border:1.5px solid var(--line);border-bottom:none;animation:rise .22s cubic-bezier(.2,.7,.3,1);padding-bottom:26px}
  @keyframes rise{from{transform:translateY(22px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .grab{width:40px;height:4px;border-radius:9px;background:var(--line);margin:9px auto 2px}
  .close{position:absolute;top:12px;right:14px;width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);background:var(--card);color:var(--muted);font-size:16px;display:grid;place-items:center;cursor:pointer;z-index:3}
  /* plant page (ported from the finalized 24-plants page) */
  .navrow{display:flex;align-items:center;gap:10px;margin:2px 16px 9px}
  .navb{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);font-size:20px;cursor:pointer;line-height:1;flex:0 0 auto}
  .navname{flex:1;text-align:center;font-family:"Caveat",cursive;font-weight:700;font-size:19px;color:var(--pen);line-height:1.1}
  .navname small{display:block;font-family:"Spline Sans";font-weight:500;font-size:11px;color:var(--muted)}
  .badges{display:flex;gap:7px;flex-wrap:wrap;margin:2px 16px 0}
  .badge{font-size:11px;padding:3px 9px;border-radius:999px;border:1.5px solid var(--line);color:var(--muted);background:var(--card)}
  .badge.tox{color:var(--rust);border-color:#cf9d8b}
  .todo{margin:12px 16px 0;background:var(--card2);border:1.5px dashed #cbb27a;border-radius:8px;padding:10px 12px}
  .todo .th{font-family:"Caveat",cursive;font-weight:700;font-size:16px;color:var(--rust);margin-bottom:6px}
  .todo .titem{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:5px 11px;margin:0 6px 6px 0;cursor:pointer}
  .todo .titem:after{content:"✓";color:var(--sage);font-weight:700}
  .phero{aspect-ratio:1/.7;margin:12px 16px 0;background:#f8f1dd;border:1.5px solid var(--line);border-radius:8px;display:grid;place-items:center;overflow:hidden}
  .phero svg{width:80%;height:80%}
  .cap{font-family:"Caveat",cursive;font-size:16px;color:var(--muted);margin:8px 16px 0;line-height:1.3}
  .cap b{color:var(--rust)}
  .pcardb{background:var(--card);border:1.5px solid var(--line);border-radius:6px 14px 5px 13px;box-shadow:2px 3px 0 rgba(120,100,60,.12);padding:13px;margin:13px 16px}
  .pcardb h3{font-size:12px;font-family:"Spline Sans";font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .pcardb h3 .ic{width:6px;height:6px;border-radius:50%;background:var(--sage)}
  .row{display:flex;align-items:center;gap:11px;margin:9px 0}
  .row label{font-size:12px;width:74px;flex:0 0 auto;color:var(--muted)}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:9px;background:var(--paper2);border:1.5px solid var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--sage);border:2px solid var(--pen);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--sage);border:2px solid var(--pen);cursor:pointer}
  .val{font-family:"Caveat",cursive;font-size:16px;font-weight:700;width:70px;text-align:right;flex:0 0 auto;color:var(--pen)}
  .read{font-family:"Caveat",cursive;font-size:16px;color:var(--pen);line-height:1.35;margin-top:7px}
  .read b{color:var(--rust)}.read .big{font-family:"Fraunces",serif;font-size:19px;color:var(--sage)}
  .seg{display:flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{flex:1;background:var(--card);border:none;border-right:1.5px solid var(--line);font:inherit;font-size:12px;padding:7px 9px;cursor:pointer;color:var(--muted);white-space:nowrap}
  .seg button:last-child{border-right:none}.seg button.on{background:var(--pen);color:var(--card)}
  .seg.sm button{font-size:11px;padding:6px 7px}
  .pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .pchip{font-size:13px;padding:6px 12px;border-radius:999px;border:1.5px solid var(--line);background:var(--card);cursor:pointer}
  .pchip.on{background:var(--pen);color:var(--card);border-color:var(--pen)}
  .pchip.sug{font-family:"Caveat",cursive;font-size:15px;border-style:dashed;color:var(--rust)}
  .mini{font-size:12px;padding:8px 13px;border-radius:8px;border:1.5px solid var(--pen);background:var(--card);cursor:pointer;font-family:inherit;white-space:nowrap}
  .mini.go{background:var(--sage);color:var(--card)}
  .between{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .datei{font:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}
  .step{display:flex;align-items:center;gap:9px}
  .step button{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);font-size:18px;cursor:pointer;line-height:1}
  .cnum{width:56px;text-align:center;font-family:"Fraunces",serif;font-size:19px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);padding:5px 4px;color:var(--ink)}
  .potwrap{display:flex;gap:13px;align-items:center;margin:4px 0}
  .potdraw{width:104px;height:104px;flex:0 0 auto;background:#f8f1dd;border:1.5px solid var(--line);border-radius:6px;display:grid;place-items:center;overflow:hidden}
  .potdraw svg{width:96%;height:96%}
  .potnums{flex:1;font-size:12.5px}
  .potnums .n{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--line)}
  .pnote{font-family:"Caveat",cursive;font-size:15px;color:var(--rust);background:var(--card2);border:1.5px solid #cbb27a;border-radius:8px;padding:8px 10px;margin-top:9px;line-height:1.3}
  .fac{font-size:11.5px;color:var(--muted);margin-top:7px;line-height:1.4}
  .tl{list-style:none;margin:0;padding:0}
  .tl li{display:flex;gap:11px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .tl li:last-child{border-bottom:none}
  .tl .d{font-family:"Caveat",cursive;font-size:15px;color:var(--rust);width:56px;flex:0 0 auto}
  .tl .x{font-size:13px}
  .tl .tlimg{width:100%;max-width:150px;border-radius:6px;border:1.5px solid var(--line);margin-top:5px;display:block}
  .addnote{display:flex;gap:8px;margin-top:10px}
  .addnote input{flex:1;font:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}
  /* photos */
  .photos{display:flex;gap:8px;flex-wrap:wrap}
  .photos .ph{width:88px;height:88px;border-radius:6px;border:1.5px solid var(--line);overflow:hidden;position:relative;background:#f8f1dd}
  .photos .ph img{width:100%;height:100%;object-fit:cover}
  .photos .ph .del{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(40,30,10,.6);color:#fff;border:none;font-size:12px;cursor:pointer;line-height:1}
  .photos .addphoto{width:88px;height:88px;border-radius:6px;border:1.5px dashed var(--pencil);background:var(--card2);display:grid;place-items:center;cursor:pointer;color:var(--muted);font-family:"Caveat",cursive;font-size:15px;text-align:center;line-height:1.1}
  /* recipes / soil */
  .block{margin:15px 16px;background:var(--card);border:1.5px solid var(--line);border-radius:6px 13px 5px 12px;padding:14px;box-shadow:2px 3px 0 rgba(120,100,60,.1)}
  .block h3{font-size:14px;margin-bottom:9px;font-family:"Spline Sans";font-weight:600;display:flex;align-items:center}
  .block h3 .k{font-family:"Caveat",cursive;font-weight:700;font-size:19px}
  .recipe{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .recipe:last-child{border-bottom:none} .recipe .amt{color:var(--muted)}
  .tweak{font-family:"Caveat",cursive;font-size:15px;color:var(--rust);margin-top:9px;line-height:1.35}
  .calc{display:flex;gap:8px;margin:6px 0 12px}
  .calc select,.nselect{flex:1;background:#f6efdb;border:1.5px solid var(--line);color:var(--ink);font:inherit;font-size:13px;padding:9px;border-radius:8px}
  .lede{font-size:14px;color:var(--muted);line-height:1.55} .lede b{color:var(--ink);font-weight:500}
  .phase{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)} .phase:last-child{border-bottom:none}
  .phase .pn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-family:"Caveat",cursive;font-weight:700;font-size:16px;color:var(--rust);flex:0 0 auto}
  .phase .pt{font-size:14px;font-weight:500} .phase .ps{font-size:12.5px;color:var(--muted);margin-top:2px} .phase .pstat{font-family:"Caveat",cursive;font-size:14px;margin-top:4px;color:var(--sage)}
  .add{display:flex;gap:11px;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line)} .add:last-child{border-bottom:none}
  .add .ab{width:7px;height:7px;border-radius:50%;background:var(--sage);flex:0 0 auto} .add .at{font-size:13.5px;font-weight:500} .add .as{font-size:12px;color:var(--muted)}
  /* repot run */
  .runrow{display:flex;gap:12px;align-items:center;padding:11px;border:1.5px solid var(--line);border-radius:5px 12px 6px 12px;margin-bottom:9px;background:var(--card);cursor:pointer;box-shadow:2px 3px 0 rgba(120,100,60,.1);position:relative}
  .runrow.done{background:var(--card2)}
  .runrow .rn{font-family:"Caveat",cursive;font-weight:700;font-size:18px;color:var(--faint);width:22px;text-align:center;flex:0 0 auto}
  .runrow .rt{flex:1;min-width:0} .runrow .rtn{font-size:14px;font-weight:500} .runrow .rts{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .steps{display:flex;gap:6px;margin:14px 16px 4px} .steps .s{flex:1;height:5px;border-radius:9px;background:var(--paper2);border:1.5px solid var(--line)} .steps .s.on{background:var(--sage);border-color:var(--sage)}
  .rstep .k{font-family:"Caveat",cursive;font-weight:700;font-size:18px;color:var(--rust);margin:8px 16px 0}
  .checkrow{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1.5px solid var(--line);border-radius:8px;padding:13px;margin-bottom:10px;cursor:pointer;box-shadow:2px 3px 0 rgba(120,100,60,.09)}
  .checkrow .box{width:24px;height:24px;border-radius:5px;border:2px solid var(--pencil);flex:0 0 auto;display:grid;place-items:center;margin-top:1px}
  .checkrow.on .box{background:var(--sage);border-color:var(--sage)}
  .checkrow .box svg{width:15px;height:15px;opacity:0} .checkrow.on .box svg{opacity:1}
  .checkrow .ct{font-size:14px;font-weight:500} .checkrow .cs{font-size:12.5px;color:var(--muted);margin-top:2px}
  .note{font-family:"Caveat",cursive;font-size:16px;color:var(--rust);background:var(--card2);border:1.5px solid #cbb27a;border-radius:8px;padding:10px 12px;margin:11px 16px 0;line-height:1.3}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 12px}
  .rchip{font-size:13px;padding:8px 12px;border-radius:999px;border:1.5px solid var(--line);background:#f4ecd6;cursor:pointer}
  .rchip.on{background:var(--pen);color:var(--card);border-color:var(--pen)}
  .nfield{width:100%;background:#f6efdb;border:1.5px solid var(--line);border-radius:8px;color:var(--ink);font-family:"Caveat",cursive;font-size:18px;padding:11px;outline:none;resize:none;min-height:78px}
  .btn{display:block;width:calc(100% - 32px);margin:16px;padding:15px;border-radius:8px 16px 7px 15px;border:1.5px solid var(--pen);font-family:"Fraunces",serif;font-size:16px;cursor:pointer;text-align:center;box-shadow:2px 3px 0 rgba(60,55,25,.24)}
  .btn:active{transform:translate(1px,1px)}
