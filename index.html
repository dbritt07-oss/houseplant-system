<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#ece1c6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Plant Daddy HQ">
<title>Plant Daddy HQ</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Spline+Sans:wght@400;500;600&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ece1c6; --paper2:#e4d7b7; --card:#f4ecd6; --card2:#efe6cd;
    --ink:#2f3d2c; --ink-green:#2f3d2c; --pen:#463d2d; --pencil:#a89a7e; --muted:#655c46; --faint:#685e49;
    --line:#cabf9d; --sage:#5f7a4c; --wash:#8fa978; --rust:#b0563a; --gold:#b3872f; --bloom:#5b6b86;
    --ok:#5f7a4c; --warn:#b3872f; --bad:#b0563a;
  
    /* --- fonts --- */
    --font-serif:"Cormorant Garamond",Georgia,serif; --font-hand:"Caveat",cursive; --font-sans:"Spline Sans",system-ui,sans-serif;
    /* --- surfaces --- */
    --panel:#f8f1dd; --field:#f6efdb; --card3:#e6ddbf; --paper-lite:#efe5ca; --white:#fff;
    /* --- status borders + accents --- */
    --border-ok:#9fb083; --border-warn:#cbb27a; --border-bad:#cf9d8b; --sage2:#6b8656; --undo:#e9d9a8;
    /* --- shadows / scrims / tints --- */
    --sh-card:rgba(120,100,60,.12); --sh-card-soft:rgba(120,100,60,.1); --sh-card-softer:rgba(120,100,60,.09); --sh-card-strong:rgba(120,100,60,.13);
    --sh-btn:rgba(60,55,25,.3); --sh-btn-soft:rgba(60,55,25,.24); --sh-fab:rgba(60,55,25,.34); --sh-app:rgba(60,45,20,.28);
    --scrim:rgba(40,30,10,.42); --scrim-strong:rgba(40,30,10,.6); --sh-toast:rgba(40,30,10,.3);
    --topbar-bg:rgba(236,225,198,.92); --nav-bg:rgba(232,220,190,.95);
    --dotgrid:rgba(120,105,70,.16); --dotgrid-sheet:rgba(120,105,70,.14); --hair:rgba(0,0,0,.15);
    /* --- laid paper (herbarium ground; replaces the dot-grid per Visual Constitution §2) --- */
    --laid:repeating-linear-gradient(0deg, rgba(70,60,35,.05) 0 1px, transparent 1px 4px),repeating-linear-gradient(90deg, rgba(70,60,35,.055) 0 1px, transparent 1px 27px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);line-height:1.45;
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center}
  #app{width:100%;max-width:440px;min-height:100vh;position:relative;padding-bottom:calc(148px + env(safe-area-inset-bottom));overflow-x:hidden;
    background:var(--laid), linear-gradient(180deg,var(--paper-lite),var(--paper));
    box-shadow:0 0 50px var(--sh-app)}
  .pad{padding:16px 16px 0}
  h1,h2,h3{font-family:var(--font-serif);font-weight:500;letter-spacing:-.01em;margin:0}
  .hand{font-family:var(--font-hand)}
  .eyebrow{font-family:var(--font-hand);font-size:16px;color:var(--muted);margin:0 0 2px}
  .muted{color:var(--muted)} .faint{color:var(--faint)} i{font-style:italic}
  /* top bar */
  .topbar{position:sticky;top:0;z-index:20;background:var(--topbar-bg);backdrop-filter:blur(8px);
    border-bottom:1.5px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .topbar .t{font-family:var(--font-hand);font-size:23px;font-weight:700;line-height:1}
  .topbar .d{font-family:var(--font-hand);font-size:16px;color:var(--muted)}
  .iconbtn{width:44px;height:44px;border-radius:11px;border:1.5px solid var(--line);background:var(--card);cursor:pointer;display:grid;place-items:center;color:var(--pen)}
  .iconbtn svg{width:19px;height:19px}
  /* cards, stats */
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:5px 14px 6px 12px;box-shadow:2px 3px 0 var(--sh-card-strong)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
  .stat{background:var(--card);border:1.5px solid var(--line);border-radius:6px 12px 5px 12px;padding:11px 8px;text-align:center;box-shadow:2px 3px 0 var(--sh-card-soft)}
  .stat .n{font-family:var(--font-serif);font-size:24px;line-height:1}
  .stat .l{font-family:var(--font-sans);font-size:12px;color:var(--muted);margin-top:3px}
  .prog{height:12px;background:var(--paper2);border:1.5px solid var(--line);border-radius:9px;overflow:hidden;margin:4px 0 3px}
  .progfill{height:100%;background:repeating-linear-gradient(45deg,var(--sage),var(--sage) 6px,var(--sage2) 6px,var(--sage2) 12px)}
  .section-h{display:flex;justify-content:space-between;align-items:baseline;margin:22px 0 11px}
  .section-h h2{font-size:20px} .section-h .more{font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--rust);cursor:pointer}
  .banner{background:var(--card2);border:1.5px solid var(--line);border-radius:6px 14px 5px 13px;padding:13px;display:flex;gap:12px;align-items:center;box-shadow:2px 3px 0 var(--sh-card-soft)}
  .banner .ic{width:38px;height:38px;border-radius:50%;background:var(--card3);border:1.5px solid var(--line);display:grid;place-items:center;flex:0 0 auto}
  .banner .ic svg{width:22px;height:22px} .banner .bt{font-weight:500;font-size:14px} .banner .bs{font-size:12.5px;color:var(--muted)}
  .cta{display:flex;width:100%;margin-top:14px;padding:15px;border:1.5px solid var(--pen);border-radius:8px 16px 7px 15px;
    background:var(--sage);color:var(--card);font-family:var(--font-serif);font-size:17px;align-items:center;justify-content:center;gap:9px;cursor:pointer;box-shadow:2px 3px 0 var(--sh-btn)}
  .cta:active{transform:translate(1px,1px);box-shadow:1px 2px 0 var(--sh-btn)}
  .cta .arw{font-family:var(--font-hand);font-size:22px}
  /* queue card */
  .qcard{display:flex;gap:12px;align-items:center;background:var(--card);border:1.5px solid var(--line);border-radius:5px 12px 6px 12px;padding:10px;margin-bottom:9px;cursor:pointer;box-shadow:2px 3px 0 var(--sh-card-soft);position:relative}
  .qcard:active{transform:translate(1px,1px)}
  .qthumb{width:50px;height:56px;border-radius:4px;background:var(--panel);border:1.5px solid var(--line);flex:0 0 auto;overflow:hidden;display:grid;place-items:center}
  .qthumb svg{width:100%;height:100%} .qthumb img{width:100%;height:100%;object-fit:cover}
  .qbody{flex:1;min-width:0}
  .qname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qlatin{font-family:var(--font-serif);font-style:italic;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qaction{font-size:12px;margin-top:3px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip{font-size:11px;padding:3px 9px;border-radius:999px;border:1.5px solid var(--line);color:var(--muted);white-space:nowrap;background:var(--card)}
  .chip.ok{color:var(--ok);border-color:var(--border-ok)} .chip.warn{color:var(--warn);border-color:var(--border-warn)} .chip.bad{color:var(--bad);border-color:var(--border-bad)}
  /* plants grid */
  .search{width:100%;background:var(--field);border:1.5px solid var(--line);border-radius:8px;color:var(--ink);font:inherit;font-size:14px;padding:11px 13px;margin-bottom:12px;outline:none}
  .search::placeholder{color:var(--faint)}
  .filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:13px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .fbtn{font-family:var(--font-sans);font-size:13px;font-weight:500;padding:0 14px;min-height:44px;display:inline-flex;align-items:center;border-radius:999px;border:1.5px solid var(--line);background:var(--card);color:var(--muted);white-space:nowrap;cursor:pointer}
  .fbtn.on{background:var(--ink-green);color:var(--card);border-color:var(--ink-green)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pcard{background:var(--card);border:1.5px solid var(--line);border-radius:5px 13px 6px 12px;overflow:hidden;cursor:pointer;box-shadow:2px 3px 0 var(--sh-card);position:relative}
  .pcard:active{transform:translate(1px,1px)}
  .pcard .panel{aspect-ratio:1/.9;background:var(--panel);display:grid;place-items:center;position:relative;border-bottom:1.5px solid var(--line)}
  .pcard .panel svg{width:86%;height:86%} .pcard .panel img{width:100%;height:100%;object-fit:cover}
  .pcard .pageno{position:absolute;bottom:5px;right:8px;font-family:var(--font-hand);font-size:14px;color:var(--faint)}
  .pcard .dot{position:absolute;top:8px;left:8px;width:9px;height:9px;border-radius:50%;border:1px solid var(--hair)}
  .pcard .info{padding:8px 10px 10px}
  .pcard .cn{font-size:13px;font-weight:500;line-height:1.15}
  .pcard .ln{font-family:var(--font-serif);font-style:italic;font-size:10.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pcard .loc{font-family:var(--font-sans);font-size:11.5px;color:var(--faint);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* overlay + sheet */
  .overlay{position:fixed;inset:0;z-index:50;display:flex;justify-content:center;align-items:flex-end}
  .overlay .scrim{position:absolute;inset:0;background:var(--scrim)}
  .sheet{position:relative;width:100%;max-width:440px;max-height:94vh;overflow-y:auto;background:var(--paper);
    background-image:var(--laid);
    border-radius:18px 18px 0 0;border:1.5px solid var(--line);border-bottom:none;animation:rise .22s cubic-bezier(.2,.7,.3,1);padding-bottom:26px}
  @keyframes rise{from{transform:translateY(22px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .grab{width:40px;height:4px;border-radius:9px;background:var(--line);margin:9px auto 2px}
  /* persistent close — stays reachable while the sheet scrolls (anchored to the sheet's right edge) */
  .close{position:fixed;top:12px;right:max(14px, calc(50% - 204px));width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:18px;display:grid;place-items:center;cursor:pointer;z-index:55;box-shadow:0 1px 4px rgba(60,45,20,.16)}
  /* plant page (ported from the finalized 24-plants page) */
  .navrow{display:flex;align-items:center;gap:10px;margin:2px 16px 9px}
  /* de-emphasized nav arrows — bare editorial glyphs, 44px tap target kept, labelled for AT */
  .navb{width:44px;height:44px;border-radius:11px;border:none;background:transparent;font-size:24px;cursor:pointer;line-height:1;flex:0 0 auto;color:var(--muted)}
  .navb:active{color:var(--ink-green)}
  .navname{flex:1;text-align:center;font-family:var(--font-serif);font-style:italic;font-weight:500;font-size:20px;color:var(--ink-green);line-height:1.1}
  .navname small{display:block;font-family:var(--font-sans);font-weight:500;font-size:11px;color:var(--muted)}
  .badges{display:flex;gap:7px;flex-wrap:wrap;margin:2px 16px 0}
  .badge{font-size:11px;padding:3px 9px;border-radius:999px;border:1.5px solid var(--line);color:var(--muted);background:var(--card)}
  .badge.tox{color:var(--rust);border-color:var(--border-bad)}
  .todo{margin:12px 16px 0;background:var(--card2);border:1.5px dashed var(--border-warn);border-radius:8px;padding:10px 12px}
  .todo .th{font-family:var(--font-hand);font-weight:700;font-size:16px;color:var(--rust);margin-bottom:6px}
  .todo .titem{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:5px 11px;margin:0 6px 6px 0;cursor:pointer}
  .todo .titem:after{content:"✓";color:var(--sage);font-weight:700}
  .phero{aspect-ratio:1/.7;margin:12px 16px 0;background:var(--panel);border:1.5px solid var(--line);border-radius:8px;display:grid;place-items:center;overflow:hidden}
  .phero svg{width:80%;height:80%}
  .cap{font-family:var(--font-hand);font-size:16px;color:var(--muted);margin:8px 16px 0;line-height:1.3}
  .cap b{color:var(--rust)}
  .pcardb{background:var(--card);border:1.5px solid var(--line);border-radius:6px 14px 5px 13px;box-shadow:2px 3px 0 var(--sh-card);padding:13px;margin:13px 16px}
  .pcardb h3{font-size:12px;font-family:var(--font-sans);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .pcardb h3 .ic{width:6px;height:6px;border-radius:50%;background:var(--sage)}
  .row{display:flex;align-items:center;gap:11px;margin:9px 0}
  .row label{font-size:12px;width:74px;flex:0 0 auto;color:var(--muted)}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:9px;background:var(--paper2);border:1.5px solid var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--sage);border:2px solid var(--pen);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--sage);border:2px solid var(--pen);cursor:pointer}
  .val{font-family:var(--font-sans);font-size:14px;font-weight:600;width:70px;text-align:right;flex:0 0 auto;color:var(--pen)}
  .read{font-family:var(--font-sans);font-size:13.5px;color:var(--pen);line-height:1.5;margin-top:7px}
  .read b{color:var(--rust)}.read .big{font-family:var(--font-serif);font-size:19px;color:var(--sage)}
  .seg{display:flex;border:1.5px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{flex:1;background:var(--card);border:none;border-right:1.5px solid var(--line);font:inherit;font-size:12px;padding:7px 9px;cursor:pointer;color:var(--muted);white-space:nowrap}
  .seg button:last-child{border-right:none}.seg button.on{background:var(--pen);color:var(--card)}
  .seg.sm button{font-size:11px;padding:6px 7px}
  .pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .pchip{font-size:13px;padding:6px 12px;border-radius:999px;border:1.5px solid var(--line);background:var(--card);cursor:pointer}
  .pchip.on{background:var(--pen);color:var(--card);border-color:var(--pen)}
  .pchip.sug{font-family:var(--font-sans);font-size:12px;font-weight:500;border-style:dashed;color:var(--rust)}
  .mini{font-size:12px;padding:8px 13px;border-radius:8px;border:1.5px solid var(--pen);background:var(--card);cursor:pointer;font-family:inherit;white-space:nowrap}
  .mini.go{background:var(--sage);color:var(--card)}
  .between{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .datei{font:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}
  .step{display:flex;align-items:center;gap:9px}
  .step button{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);font-size:18px;cursor:pointer;line-height:1}
  .cnum{width:56px;text-align:center;font-family:var(--font-serif);font-size:19px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);padding:5px 4px;color:var(--ink)}
  .potwrap{display:flex;gap:13px;align-items:center;margin:4px 0}
  .potdraw{width:104px;height:104px;flex:0 0 auto;background:var(--panel);border:1.5px solid var(--line);border-radius:6px;display:grid;place-items:center;overflow:hidden}
  .potdraw svg{width:96%;height:96%}
  .potnums{flex:1;font-size:12.5px}
  .potnums .n{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dashed var(--line)}
  .pnote{font-family:var(--font-hand);font-size:15px;color:var(--rust);background:var(--card2);border:1.5px solid var(--border-warn);border-radius:8px;padding:8px 10px;margin-top:9px;line-height:1.3}
  .fac{font-size:11.5px;color:var(--muted);margin-top:7px;line-height:1.4}
  .tl{list-style:none;margin:0;padding:0}
  .tl li{display:flex;gap:11px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .tl li:last-child{border-bottom:none}
  .tl .d{font-family:var(--font-hand);font-size:15px;color:var(--rust);width:56px;flex:0 0 auto}
  .tl .x{font-size:13px}
  .tl .tlimg{width:100%;max-width:150px;border-radius:6px;border:1.5px solid var(--line);margin-top:5px;display:block}
  .addnote{display:flex;gap:8px;margin-top:10px}
  .addnote input{flex:1;font:inherit;font-size:13px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink)}
  /* photos */
  .photos{display:flex;gap:8px;flex-wrap:wrap}
  .photos .ph{width:88px;height:88px;border-radius:6px;border:1.5px solid var(--line);overflow:hidden;position:relative;background:var(--panel)}
  .photos .ph img{width:100%;height:100%;object-fit:cover}
  .photos .ph .del{position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:var(--scrim-strong);color:var(--white);border:none;font-size:12px;cursor:pointer;line-height:1}
  .photos .addphoto{width:88px;height:88px;border-radius:6px;border:1.5px dashed var(--pencil);background:var(--card2);display:grid;place-items:center;cursor:pointer;color:var(--muted);font-family:var(--font-sans);font-size:12px;font-weight:500;text-align:center;line-height:1.2}
  /* recipes / soil */
  .block{margin:15px 16px;background:var(--card);border:1.5px solid var(--line);border-radius:6px 13px 5px 12px;padding:14px;box-shadow:2px 3px 0 var(--sh-card-soft)}
  .block h3{font-size:14px;margin-bottom:9px;font-family:var(--font-sans);font-weight:600;display:flex;align-items:center}
  .block h3 .k{font-family:var(--font-serif);font-style:italic;font-weight:500;font-size:18px;color:var(--ink-green)}
  .recipe{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .recipe:last-child{border-bottom:none} .recipe .amt{color:var(--muted)}
  .tweak{font-family:var(--font-hand);font-size:15px;color:var(--rust);margin-top:9px;line-height:1.35}
  /* collapsible reference section (Soil page) */
  .disc{display:flex;justify-content:space-between;align-items:center;margin:15px 16px;background:var(--card);border:1.5px solid var(--line);border-radius:6px 13px 5px 12px;padding:12px 14px;cursor:pointer;box-shadow:2px 3px 0 var(--sh-card-soft)}
  .disc .k{font-family:var(--font-serif);font-style:italic;font-weight:500;font-size:18px;color:var(--ink-green)}
  .disc .chev{font-family:var(--font-sans);font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--muted)}
  .calc{display:flex;gap:8px;margin:6px 0 12px}
  .calc select,.nselect{flex:1;background:var(--field);border:1.5px solid var(--line);color:var(--ink);font:inherit;font-size:13px;padding:9px;border-radius:8px}
  .lede{font-size:14px;color:var(--muted);line-height:1.55} .lede b{color:var(--ink);font-weight:500}
  .phase{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)} .phase:last-child{border-bottom:none}
  .phase .pn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-family:var(--font-hand);font-weight:700;font-size:16px;color:var(--rust);flex:0 0 auto}
  .phase .pt{font-size:14px;font-weight:500} .phase .ps{font-size:12.5px;color:var(--muted);margin-top:2px} .phase .pstat{font-family:var(--font-hand);font-size:14px;margin-top:4px;color:var(--sage)}
  .add{display:flex;gap:11px;align-items:center;padding:9px 0;border-bottom:1px dashed var(--line)} .add:last-child{border-bottom:none}
  .add .ab{width:7px;height:7px;border-radius:50%;background:var(--sage);flex:0 0 auto} .add .at{font-size:13.5px;font-weight:500} .add .as{font-size:12px;color:var(--muted)}
  /* repot run */
  .runrow{display:flex;gap:12px;align-items:center;padding:11px;border:1.5px solid var(--line);border-radius:5px 12px 6px 12px;margin-bottom:9px;background:var(--card);cursor:pointer;box-shadow:2px 3px 0 var(--sh-card-soft);position:relative}
  .runrow.done{background:var(--card2)}
  .runrow .rn{font-family:var(--font-hand);font-weight:700;font-size:18px;color:var(--faint);width:22px;text-align:center;flex:0 0 auto}
  .runrow .rt{flex:1;min-width:0} .runrow .rtn{font-size:14px;font-weight:500} .runrow .rts{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .steps{display:flex;gap:6px;margin:14px 16px 4px} .steps .s{flex:1;height:5px;border-radius:9px;background:var(--paper2);border:1.5px solid var(--line)} .steps .s.on{background:var(--sage);border-color:var(--sage)}
  .rstep .k{font-family:var(--font-sans);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--rust);margin:8px 16px 0}
  .checkrow{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1.5px solid var(--line);border-radius:8px;padding:13px;margin-bottom:10px;cursor:pointer;box-shadow:2px 3px 0 var(--sh-card-softer)}
  .checkrow .box{width:24px;height:24px;border-radius:5px;border:2px solid var(--pencil);flex:0 0 auto;display:grid;place-items:center;margin-top:1px}
  .checkrow.on .box{background:var(--sage);border-color:var(--sage)}
  .checkrow .box svg{width:15px;height:15px;opacity:0} .checkrow.on .box svg{opacity:1}
  .checkrow .ct{font-size:14px;font-weight:500} .checkrow .cs{font-size:12.5px;color:var(--muted);margin-top:2px}
  .note{font-family:var(--font-hand);font-size:16px;color:var(--rust);background:var(--card2);border:1.5px solid var(--border-warn);border-radius:8px;padding:10px 12px;margin:11px 16px 0;line-height:1.3}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 12px}
  .rchip{font-size:13px;padding:8px 12px;border-radius:999px;border:1.5px solid var(--line);background:var(--card);cursor:pointer}
  .rchip.on{background:var(--pen);color:var(--card);border-color:var(--pen)}
  .nfield{width:100%;background:var(--field);border:1.5px solid var(--line);border-radius:8px;color:var(--ink);font-family:var(--font-hand);font-size:18px;padding:11px;outline:none;resize:none;min-height:78px}
  .btn{display:block;width:calc(100% - 32px);margin:16px;padding:15px;border-radius:8px 16px 7px 15px;border:1.5px solid var(--pen);font-family:var(--font-serif);font-size:16px;cursor:pointer;text-align:center;box-shadow:2px 3px 0 var(--sh-btn-soft)}
  .btn:active{transform:translate(1px,1px)}
  .btn.primary{background:var(--sage);color:var(--card)} .btn.ghost{background:var(--card);color:var(--ink)}
  .btn.dim{opacity:.55}
  /* bottom nav */
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:var(--nav-bg);backdrop-filter:blur(10px);border-top:1.5px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:40;padding-bottom:env(safe-area-inset-bottom)}
  .nav button{background:none;border:none;color:var(--muted);font-family:var(--font-sans);font-size:12px;font-weight:500;padding:8px 0 10px;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
  .nav button::after{content:"";height:2px;width:18px;border-radius:2px;background:transparent;margin-top:1px}
  .nav button.on{color:var(--ink-green)} .nav button.on::after{background:var(--bloom)} .nav svg{width:22px;height:22px}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--pen);color:var(--card);font-size:13px;padding:10px 16px;border-radius:999px;z-index:60;box-shadow:0 4px 14px var(--sh-toast);max-width:88%;text-align:center}
  .toast .undo{color:var(--undo);font-weight:600;text-decoration:underline;margin-left:8px;cursor:pointer;padding:2px 4px}
  /* quick-log buttons on Today cards */
  .qact{display:flex;gap:6px;flex:0 0 auto}
  .qbtn{width:44px;height:44px;border-radius:10px;border:1.5px solid var(--line);background:var(--card2);line-height:1;cursor:pointer;display:grid;place-items:center;color:var(--sage)}
  .qbtn svg{width:20px;height:20px}
  .qbtn:active{transform:translateY(1px);background:var(--sage)}
  /* floating add button */
  /* anchored to the app column's right edge (16px in), clamped to ≥16px on any width */
  .fab{position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));right:max(16px, calc(50% - 204px));left:auto;width:56px;height:56px;border-radius:50%;background:var(--sage);border:1.5px solid var(--pen);color:var(--card);font-size:30px;line-height:1;display:grid;place-items:center;cursor:pointer;z-index:45;box-shadow:2px 4px 0 var(--sh-fab)}
  .fab:active{transform:translateY(1px)}
  /* add menu options */
  .addopt{display:flex;gap:13px;align-items:center;background:var(--card);border:1.5px solid var(--line);border-radius:6px 14px 5px 13px;padding:14px;margin:0 16px 11px;cursor:pointer;box-shadow:2px 3px 0 var(--sh-card)}
  .addopt:active{transform:translate(1px,1px)}
  .addopt .ai{width:44px;height:44px;border-radius:50%;background:var(--card2);border:1.5px solid var(--line);display:grid;place-items:center;font-size:22px;flex:0 0 auto}
  .addopt .ot{font-size:15px;font-weight:500} .addopt .os{font-size:12.5px;color:var(--muted);margin-top:2px}
  .nfld{width:100%;background:var(--field);border:1.5px solid var(--line);border-radius:8px;color:var(--ink);font:inherit;font-size:14px;padding:11px;outline:none;margin-bottom:8px}
  .nfld:last-child{margin-bottom:0}
  /* room grouping */
  .roomhead{display:flex;align-items:center;gap:9px;margin:16px 2px 9px;grid-column:1 / -1}
  .roomhead .rl{font-family:var(--font-sans);font-weight:600;font-size:15px;color:var(--ink-green)}
  .roomhead .rc{font-size:11px;color:var(--muted);background:var(--card2);border:1.5px solid var(--line);border-radius:999px;padding:2px 8px}
  .roomhead .line{flex:1;height:1px;background:var(--line)}
  /* --- P1-4 · Study specimen plate --- */
  .plate-head{position:relative;margin:44px 18px 0}
  .ph-nav{display:flex;justify-content:space-between;align-items:center}
  .ph-count{font-family:var(--font-sans);font-size:11px;letter-spacing:.12em;color:var(--muted)}
  .ph-name{font-family:var(--font-serif);font-weight:600;font-size:34px;line-height:.95;color:var(--ink-green);margin:10px 0 0}
  .ph-binom{font-family:var(--font-serif);font-style:italic;font-size:19px;color:var(--pen);margin-top:1px}
  .ph-fam{font-family:var(--font-sans);font-variant:small-caps;letter-spacing:.14em;font-size:11px;color:var(--muted);margin-top:5px}
  /* collector's seal — stamped on the plate itself, out of the crowded header corner */
  .mount-stamp{position:absolute;bottom:8px;right:10px;width:54px;height:54px;border:1.3px solid var(--rust);border-radius:50%;color:var(--rust);opacity:.58;display:grid;place-items:center;text-align:center;transform:rotate(-8deg);font-family:var(--font-sans);font-size:6.5px;letter-spacing:.03em;text-transform:uppercase;line-height:1.2;padding:5px;pointer-events:none}
  .mount-stamp b{display:block;font-size:9px;margin:1px 0}
  .ph-tags{display:flex;gap:6px;margin-top:9px;border-bottom:2px solid var(--ink-green);padding-bottom:11px}
  .ptag{font-family:var(--font-sans);font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-green);background:var(--card2);border:1px solid var(--border-warn);border-radius:2px;padding:3px 7px;display:inline-flex;gap:5px;align-items:center}
  .ptag .w{width:8px;height:8px;border-radius:1px}
  .mount{position:relative;margin:14px 18px 0;background:var(--card);background-image:var(--laid);border:1px solid var(--line);border-radius:2px;padding:16px 12px;display:flex;gap:4px}
  .mount .reg{position:absolute;width:12px;height:12px;border:1px solid var(--muted);opacity:.5}
  .mount .reg.tl{top:5px;left:5px;border-right:none;border-bottom:none}
  .mount .reg.tr{top:5px;right:5px;border-left:none;border-bottom:none}
  .mount .reg.bl{bottom:5px;left:5px;border-right:none;border-top:none}
  .mount .reg.br{bottom:5px;right:5px;border-left:none;border-top:none}
  .mdraw{flex:0 0 60%;display:grid;place-items:center;min-height:150px}
  .mdraw svg{width:92%;height:auto}
  .mgutter{flex:1;display:flex;flex-direction:column;justify-content:center;gap:22px;padding-left:32px}
  .mgutter .call{font-family:var(--font-sans);font-size:9.5px;font-variant:small-caps;letter-spacing:.08em;color:var(--muted);position:relative}
  .mgutter .call::before{content:"";position:absolute;left:-30px;top:50%;width:26px;border-top:1px dotted var(--pen);opacity:.55}
  .mgutter .call::after{content:"";position:absolute;left:-32px;top:calc(50% - 2px);width:4px;height:4px;border-radius:50%;background:var(--pen);opacity:.55}
  /* museum treatment — on the plant plate, boxed cards become one continuous sheet with hairline sections */
  .sheet.plate .pcardb{background:transparent;border:none;box-shadow:none;border-radius:0;margin:0 18px;padding:15px 0 5px;border-top:1px solid var(--line)}
  .sheet.plate .zsec + .pcardb{border-top:none}
  .detlabel{background:var(--card);border:1px solid var(--line);border-radius:2px;padding:7px 10px;margin:9px 18px 0;box-shadow:1px 1px 0 var(--sh-card-soft)}
  .detlabel .dt{font-family:var(--font-serif);font-style:italic;font-size:15px;color:var(--ink-green)}
  .detlabel .df{font-family:var(--font-sans);font-variant:small-caps;letter-spacing:.12em;font-size:9.5px;color:var(--muted);margin-top:1px}
  .detlabel .dm{font-family:var(--font-sans);font-size:10px;color:var(--pen);margin-top:4px;border-top:1px solid var(--line);padding-top:4px}
  .swwrap{display:flex;align-items:center;gap:10px;margin:13px 18px 0}
  .swstrip{display:flex;border:1px solid var(--line);border-radius:1px;overflow:hidden}
  .swstrip i{width:30px;height:16px;display:block;position:relative}
  .swstrip i.on::after{content:"";position:absolute;inset:2px;border:1.5px solid var(--ink-green)}
  .swcap{font-family:var(--font-sans);font-variant:small-caps;letter-spacing:.12em;font-size:10px;color:var(--muted)}
  .zrule{height:1px;background:var(--line);margin:20px 18px 0}
  .zsec{font-family:var(--font-sans);font-variant:small-caps;letter-spacing:.2em;font-size:12px;color:var(--muted);margin:14px 18px 2px}
  /* --- T1.1 · accessibility + materiality (per Visual Constitution) --- */
  /* specimen/archive status tag — replaces the color-only dot on plant cards */
  .pcard .panel .spectag{position:absolute;top:6px;left:6px;z-index:1;display:inline-flex;align-items:center;gap:5px;
    font-family:var(--font-sans);font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-green);background:var(--card2);border:1px solid var(--border-warn);border-radius:2px;padding:2px 6px}
  .pcard .panel .spectag .wash{width:9px;height:9px;border-radius:1px;flex:0 0 auto}
  /* keyboard focus — restrained Bloom Blue ring */
  :focus-visible{outline:3px solid var(--bloom);outline-offset:2px}
  /* honor reduced-motion: no sheet-rise, no press transforms */
  @media (prefers-reduced-motion: reduce){
    .sheet{animation:none}
    .cta:active,.btn:active,.qcard:active,.pcard:active,.addopt:active,.fab:active,.qbtn:active{transform:none}
  }
</style>
</head>
